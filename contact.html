<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Portfolio of Pat Yoon Xin">
    <title>Contact Me</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
	<header>
		<nav>
			<a href="about.html">About</a>
			<a href="skills.html">Top Skills</a>
			<a href="academic.html">Academic Records</a>
			<a href="project.html">My Project</a>
			<a href="contact.html">Contact Me</a>
		</nav>
	</header>
	
	<main>
		<section id="Contact">
			<h2>Contact Me</h2>
			<form action="#" method="POST">
				<fieldset>
					<legend>Send me a message</legend>

					<h3>Personal Information</h3>
					<label for="name">Full name:</label><br> 
					<input type="text" id="name" name="name" required><br><br>
					<label for="email">Email:</label><br>
					<input type="email" id="email" name="email" required><br><br>
					<label for="tel">Phone number:</label><br>
					<input type="tel" id="tel" name="tel" required"><br><br>
					<label for="age">Age:</label><br>
					<input type="number" id="age" name="age"><br><br>
					<label for="dob">Date of Birth:</label><br>
					<input type="date" id="dob" name="dob"><br><br>

					<label for="subject">Subject:</label><br>
					<select name="subject" id="subject">
						<optgroup label="Academic">
							<option value="assignHelp">Assignment Help</option>
						</optgroup>
						<optgroup label="Technical">
							<option value="website">Website Issue</option>
							<option value="bug">Bug Report</option>
						</optgroup>
					</select>

					<h3>Services Interested In</h3>
					<input type="checkbox" id="webd" name="interest" value="Web Development" checked>
					<label for="webd">Web Development</label><br>
					<input type="checkbox" id="danalysis" name="interest" value="Data Analysis">
					<label for="danalysis">Data Analysis</label><br>
					<input type="checkbox" id="uiux" name="interest" value="UI/UX Design">
					<label for="uiux">UI/UX Design</label><br>

					<h3>Prefered contact method</h3>
					<input type="radio" id="emaill" name="contactm" value="Email" checked>
					<label for="emaill">Email</label><br>
					<input type="radio" id="phone" name="contactm" value="Phone">
					<label for="phone">Phone</label><br>
					<input type="radio" id="whatsapp" name="contactm" value="Whatsapp">
					<label for="whatsapp">Whatsapp</label><br>

					<h3>Satisfaction Level</h3>
					<label for="level">Please drag from 1 to 10:</label><br>
					<input type="range" id="level" name="level" min="1" max="10">

					<h3>Message</h3>
					<label for="box">Feel free to leave a message:</label><br>
					<textarea id="box" name="box" rows="4" cols="50" maxlength=200 placeholder="Hello World!"></textarea><br><br>

					<input class="button" type="submit" value="Submit">
				</fieldset>
			</form>
		</section>
	</main>
	
	<footer>
		<address>
			0162163003 | yoonxin123@gmail.com | Cheras, Selangor<br>
			<small>designed by Pat Yoon Xin</small>
		</address>
	</footer>
</body>
</html>
